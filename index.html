<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#ffffff" />
  <meta name="color-scheme" content="light">
  <title>11 Appleton #2 Tasks</title>

  <style>
    :root { color-scheme: light; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;            /* the page itself never scrolls */
      -webkit-text-size-adjust: none;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0.5rem;
      gap: 0.5rem;
      min-height: 0;               /* allow flex children to shrink */
    }

    /* Calendar (top) and tasks (bottom) each get half the screen and
       never scroll — their content is scaled to fit by fitRegion(). */
    #topHalf, #bottomHalf {
      flex: 1;
      min-height: 0;
      border: 1px solid #ccc;
      overflow: hidden;
    }
    /* Inner wrappers: fitRegion() sets font-size here; everything else
       is sized in em so it scales together. */
    #calendar-events, #sheet-items {
      padding: 0.25em;
    }

    table {
      width: 100%;
      table-layout: fixed;         /* evenly spaced columns */
      border-collapse: collapse;
      font-size: 1em;
    }
    th, td {
      border: 1px solid #ccc;
      vertical-align: top;
      padding: 0.3em 0.4em;
      word-break: break-word;
    }
    th {
      background: #f7f7f7;
      font-size: 0.85em;
    }

    .event-box {
      border-radius: 4px;
      margin-bottom: 0.3em;
      padding: 0.2em 0.4em;
      line-height: 1.2;
    }

    .stricken {
      text-decoration: line-through;
      color: #999;
    }

    /* A task with its completion checkbox. */
    .task {
      display: flex;
      align-items: flex-start;
      gap: 0.4em;
      line-height: 1.25;
    }
    .task input {
      width: 1em;
      height: 1em;
      margin: 0.1em 0 0 0;
      flex: none;
    }

    #status {
      display: none;
      padding: 0.25rem 0.5rem;
      background: #fff3cd;
      color: #7a5b00;
      font-size: 0.85rem;
      text-align: center;
    }
    .setup {
      padding: 1rem;
      font-size: 0.95rem;
      color: #444;
      line-height: 1.5;
    }
    .setup code { background: #f2f2f2; padding: 0 0.2em; border-radius: 3px; }
    .setup input {
      font-size: 1em;
      padding: 0.4em;
      width: 90%;
      max-width: 24em;
      margin: 0.5em 0;
    }
    .setup button {
      font-size: 1em;
      padding: 0.4em 1.2em;
      cursor: pointer;
    }
    .setup .hint {
      font-size: 0.85em;
      color: #777;
      margin-top: 0.75em;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main>
    <div id="topHalf"><div id="calendar-events"></div></div>
    <div id="bottomHalf"><div id="sheet-items"></div></div>
  </main>
  <div id="status"></div>

  <script>
    // --------------------------------------------------------------------
    // CONFIG  — fill this in after deploying google-apps-script.js
    // --------------------------------------------------------------------
    // Paste the Apps Script Web App "/exec" URL here. This is just the
    // endpoint address (the page needs it to make requests) — NOT a secret.
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwAOdf_QCQGE95oVIr9oQ_hJJ1azLgsnwpF-ut2IwnqYxFelBXJ4yLKtnrU-hJ0FLGrqg/exec';

    // The secret token is intentionally NOT stored in this (public) file.
    // It lives only in this tablet's localStorage. To authorize a device,
    // open the page once as:   <page-url>#token=YOUR_SECRET
    // resolveToken() saves it locally and strips it back out of the URL so
    // it isn't bookmarked, shoulder-surfed, or left in history.
    function resolveToken() {
      try {
        let incoming = null;
        if (location.hash.indexOf('#token=') === 0) {
          incoming = decodeURIComponent(location.hash.slice('#token='.length));
        } else {
          incoming = new URLSearchParams(location.search).get('token');
        }
        if (incoming) {
          incoming = incoming.trim(); // tolerate stray copy/paste whitespace
          localStorage.setItem('apiToken', incoming);
          history.replaceState(null, '', location.pathname); // scrub token from URL
        }
        return localStorage.getItem('apiToken') || '';
      } catch (e) {
        return '';
      }
    }
    const API_TOKEN = resolveToken();

    // How often to refresh everything (calendar + tasks).
    const REFRESH_MS = 5 * 60 * 1000;

    // Calendar color themes, keyed by the 'color' tag the backend sends.
    const COLORS = {
      chores: { bg: '#CDFFB8', border: '#80FF33' },
      kids:   { bg: '#FFEAB8', border: '#FFBB33' },
      family: { bg: '#B8F1FF', border: '#33BBFF' },
    };

    // --------------------------------------------------------------------
    // DATA FETCHING
    // --------------------------------------------------------------------
    function apiUrl(params) {
      const u = new URL(WEB_APP_URL);
      if (API_TOKEN) u.searchParams.set('token', API_TOKEN);
      Object.keys(params || {}).forEach(k => u.searchParams.set(k, params[k]));
      return u.toString();
    }

    async function fetchData() {
      if (!WEB_APP_URL || WEB_APP_URL.indexOf('PASTE_') === 0) {
        showSetup();
        return;
      }
      try {
        const res = await fetch(apiUrl({}));
        const json = await res.json();
        if (json.error === 'unauthorized') { showNeedsToken(); return; }
        if (!json.ok) throw new Error(json.error || 'request failed');
        render(json.data);
        setStatus('');
      } catch (err) {
        console.error('fetchData failed:', err);
        // Don't reload — just show a quiet banner and let the next poll retry.
        setStatus('Can’t reach server — retrying…');
      }
    }

    async function completeTask(row, col) {
      try {
        const res = await fetch(apiUrl({ action: 'complete', row, col }));
        const json = await res.json();
        if (!json.ok) throw new Error(json.error || 'complete failed');
      } catch (err) {
        console.error('completeTask failed:', err);
      }
      fetchData(); // refresh to reflect the strikethrough
    }

    // --------------------------------------------------------------------
    // RENDERING
    // --------------------------------------------------------------------
    function render(data) {
      renderCalendar(data.days || [], data.events || []);
      renderTasks(data.tasks || { headers: [], columns: [] });
      requestAnimationFrame(fitAll);
    }

    function renderCalendar(days, events) {
      const container = document.getElementById('calendar-events');
      container.innerHTML = '';

      const byDay = {};
      days.forEach(d => { byDay[d.key] = []; });
      events.forEach(ev => { if (byDay[ev.dateKey]) byDay[ev.dateKey].push(ev); });

      const table = document.createElement('table');

      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      days.forEach(d => {
        const th = document.createElement('th');
        th.textContent = d.label;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      const row = document.createElement('tr');
      days.forEach(d => {
        const td = document.createElement('td');
        const evs = byDay[d.key] || [];
        evs.sort((a, b) => a.sortMs - b.sortMs);
        evs.forEach(ev => {
          const box = document.createElement('div');
          box.className = 'event-box';
          const c = COLORS[ev.color] || { bg: '#eee', border: '#ccc' };
          box.style.backgroundColor = c.bg;
          box.style.border = '1px solid ' + c.border;
          box.textContent = ev.time + ' - ' + ev.summary;
          td.appendChild(box);
        });
        row.appendChild(td);
      });
      tbody.appendChild(row);
      table.appendChild(tbody);
      container.appendChild(table);
    }

    function renderTasks(tasks) {
      const container = document.getElementById('sheet-items');
      container.innerHTML = '';

      const headers = tasks.headers || [];
      let columns = (tasks.columns || []).map(col => col.slice());
      columns = removeTrailingEmptyRows(columns);
      // Non-stricken items first, completed ones sink to the bottom.
      columns.forEach(col => col.sort((a, b) =>
        a.isStricken === b.isStricken ? 0 : (a.isStricken ? 1 : -1)));

      if (!columns.length) {
        container.textContent = 'No items.';
        return;
      }

      const table = document.createElement('table');

      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      headers.forEach(h => {
        const th = document.createElement('th');
        th.textContent = h;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      const maxLen = Math.max(0, ...columns.map(col => col.length));
      for (let i = 0; i < maxLen; i++) {
        const tr = document.createElement('tr');
        for (let j = 0; j < columns.length; j++) {
          const td = document.createElement('td');
          const item = columns[j][i];

          if (!item || !item.text.trim()) {
            tr.appendChild(td);
            continue;
          }

          if (item.isStricken) {
            td.classList.add('stricken');
            td.textContent = item.text;
          } else {
            const label = document.createElement('label');
            label.className = 'task';
            const chk = document.createElement('input');
            chk.type = 'checkbox';
            chk.addEventListener('change', () => completeTask(item.row, item.col));
            const span = document.createElement('span');
            span.textContent = item.text;
            label.appendChild(chk);
            label.appendChild(span);
            td.appendChild(label);
          }
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }
      table.appendChild(tbody);
      container.appendChild(table);
    }

    function removeTrailingEmptyRows(columns) {
      if (!columns.length) return [];
      const colCount = columns.length;
      const maxLen = Math.max(0, ...columns.map(col => col.length));

      let maxRowWithData = -1;
      for (let i = 0; i < maxLen; i++) {
        let hasData = false;
        for (let c = 0; c < colCount; c++) {
          const item = columns[c][i];
          if (item && item.text.trim().length > 0) { hasData = true; break; }
        }
        if (hasData) maxRowWithData = i;
      }
      if (maxRowWithData === -1) return [];
      return columns.map(col => col.slice(0, maxRowWithData + 1));
    }

    // --------------------------------------------------------------------
    // AUTO-FIT  — scale each half's content so it fills, but never
    // overflows, its box. No scrolling under normal load.
    // --------------------------------------------------------------------
    function fitRegion(outer, inner) {
      if (!inner.firstChild) return;
      outer.style.overflow = 'hidden';

      const MIN = 8, MAX = 24;
      let lo = MIN, hi = MAX, best = MIN;
      // Binary search the largest font size that still fits.
      for (let i = 0; i < 8; i++) {
        const mid = (lo + hi) / 2;
        inner.style.fontSize = mid + 'px';
        const fits = inner.scrollHeight <= outer.clientHeight - 2 &&
                     inner.scrollWidth <= outer.clientWidth;
        if (fits) { best = mid; lo = mid; } else { hi = mid; }
      }
      inner.style.fontSize = best + 'px';

      // Safety net: if even the minimum size overflows (a hugely busy
      // day), let that half scroll rather than clip content.
      outer.style.overflow = (inner.scrollHeight > outer.clientHeight) ? 'auto' : 'hidden';
    }

    function fitAll() {
      fitRegion(document.getElementById('topHalf'),
                document.getElementById('calendar-events'));
      fitRegion(document.getElementById('bottomHalf'),
                document.getElementById('sheet-items'));
    }

    // --------------------------------------------------------------------
    // STATUS / SETUP
    // --------------------------------------------------------------------
    function setStatus(msg) {
      const el = document.getElementById('status');
      el.textContent = msg || '';
      el.style.display = msg ? 'block' : 'none';
    }

    function showSetup() {
      document.getElementById('calendar-events').innerHTML =
        '<div class="setup">Almost there. Deploy <code>google-apps-script.js</code> ' +
        'as a Web App, then set <code>WEB_APP_URL</code> at the top of ' +
        '<code>index.html</code>.</div>';
      document.getElementById('sheet-items').innerHTML = '';
      requestAnimationFrame(fitAll);
    }

    function showNeedsToken() {
      const here = location.origin + location.pathname;
      const stored = localStorage.getItem('apiToken') || '';
      const cal = document.getElementById('calendar-events');
      cal.innerHTML = '';

      const box = document.createElement('div');
      box.className = 'setup';

      const p = document.createElement('p');
      p.textContent = 'This tablet isn’t authorized yet. Paste the access token and tap Authorize:';
      box.appendChild(p);

      const input = document.createElement('input');
      input.type = 'text';
      input.id = 'tokenInput';
      input.placeholder = 'access token';
      input.autocapitalize = 'off';
      input.autocomplete = 'off';
      input.autocorrect = 'off';
      input.spellcheck = false;
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') saveTokenFromInput(); });
      box.appendChild(input);

      const btn = document.createElement('button');
      btn.textContent = 'Authorize';
      btn.addEventListener('click', saveTokenFromInput);
      box.appendChild(btn);

      const hint = document.createElement('p');
      hint.className = 'hint';
      hint.textContent = stored
        ? ('This device currently has a ' + stored.length + '-character token saved, which the ' +
           'server rejected — most likely a typo. Re-paste to replace it.')
        : ('You can also open this page as ' + here + '#token=YOUR_TOKEN — pasting is more reliable.');
      box.appendChild(hint);

      cal.appendChild(box);
      document.getElementById('sheet-items').innerHTML = '';
      requestAnimationFrame(fitAll);
    }

    function saveTokenFromInput() {
      const input = document.getElementById('tokenInput');
      if (!input) return;
      const val = input.value.trim();
      if (!val) return;
      try { localStorage.setItem('apiToken', val); } catch (e) { /* storage blocked */ }
      location.reload();
    }

    // --------------------------------------------------------------------
    // INIT
    // --------------------------------------------------------------------
    let resizeTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(fitAll, 150);
    });

    // Adding #token=... to an already-open tab only changes the fragment and
    // doesn't re-run this script; reload so resolveToken() captures it.
    window.addEventListener('hashchange', () => {
      if (location.hash.indexOf('#token=') === 0) location.reload();
    });

    fetchData();
    setInterval(fetchData, REFRESH_MS);
  </script>
</body>
</html>
